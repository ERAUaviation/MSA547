<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSA 547 · Aviation Leadership</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.1.0/wordcloud2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --navy: #0a1628; --orange: #f4793e; --white: #ffffff; }
        body { background: var(--navy); color: var(--white); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .card { background: #111d33; padding: 2rem; border-radius: 24px; width: 90%; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .answer-input { width: 100%; padding: 16px; margin: 20px 0; border-radius: 12px; border: 2px solid #334; background: #0a1628; color: #fff; font-size: 1.1rem; }
        .btn { width: 100%; padding: 18px; border-radius: 50px; border: none; background: var(--orange); color: #fff; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        #wordCloudCanvas { width: 100%; height: 80vh; }
        #qrCode { background: white; padding: 10px; border-radius: 10px; margin: 20px 0; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- STUDENT INPUT VIEW -->
    <div id="studentView" class="card">
        <h1>What makes you trust an aviation leader?</h1>
        <form id="pollForm" action="https://docs.google.com/forms/d/e/1FAIpQLSf1TqzrUIvGkqz4ektOj4sRyLRaUrNli4bb6LJz4fT-1Ll9zw/formResponse" method="POST" target="hidden_iframe">
            <input type="text" name="entry.192253551" class="answer-input" placeholder="1–2 words..." required autocomplete="off">
            <button type="submit" class="btn">✈️ Submit</button>
        </form>
    </div>

    <!-- INSTRUCTOR RESULTS VIEW -->
    <div id="resultsView" class="hidden">
        <div id="qrCode"></div>
        <p>Scan to participate</p>
        <canvas id="wordCloudCanvas"></canvas>
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <script>
        const PUBLISHED_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTZu3WENFFKzTpkrrgEZrB9KtvJk0RTUJsyhGr0Wys3quuN4RvE5lp4QQnNKR19LRvnHoNySwLGqfx8/pub?gid=370434378&single=true&output=csv';

        // Check if we are in "Results" mode via URL: ?view=results
        const params = new URLSearchParams(window.location.search);
        if (params.get('view') === 'results') {
            document.getElementById('studentView').classList.add('hidden');
            document.getElementById('resultsView').classList.remove('hidden');
            new QRCode(document.getElementById("qrCode"), window.location.origin + window.location.pathname);
            updateWordCloud();
            setInterval(updateWordCloud, 10000);
        }

        async function updateWordCloud() {
            try {
                const response = await fetch(PUBLISHED_CSV_URL);
                const csvText = await response.text();
                const rows = csvText.split('\n').slice(1);
                const wordList = rows.filter(r => r.trim()).map(row => [row.split(',')[1], 15]);
                WordCloud(document.getElementById('wordCloudCanvas'), { list: wordList, color: 'random-light', backgroundColor: '#0a1628' });
            } catch (e) { console.error(e); }
        }

        document.getElementById('hidden_iframe').onload = function() {
            alert('Response submitted!');
            document.getElementById('pollForm').reset();
        };
    </script>
</body>
</html>
