<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>MSA 547 · Live Feedback Cloud</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.1.0/wordcloud2.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js">
    </script>
    <style>
        /* ─── Reset & Base ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #0b1a2e;
            --orange: #f4793e;
            --orange-glow: #f4793e88;
            --gold: #fbbf6e;
            --white: #f0f4ff;
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.10);
            --shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
            --radius: 28px;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--navy);
            color: var(--white);
            overflow-x: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        /* ─── Animated Background ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(244, 121, 62, 0.20) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(251, 191, 110, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(10, 22, 40, 0.80) 0%, var(--navy) 100%);
            animation: bgPulse 12s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% {
                opacity: 0.7;
                transform: scale(1);
            }
            100% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        /* ─── Floating Orbs ─── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
            animation: orbFloat 18s ease-in-out infinite alternate;
        }
        .orb--1 {
            width: 400px;
            height: 400px;
            background: var(--orange);
            top: -10%;
            left: -10%;
            animation-duration: 22s;
        }
        .orb--2 {
            width: 300px;
            height: 300px;
            background: var(--gold);
            bottom: -10%;
            right: -10%;
            animation-duration: 26s;
            animation-delay: -6s;
        }
        .orb--3 {
            width: 200px;
            height: 200px;
            background: #4a7cf7;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 20s;
            animation-delay: -10s;
            opacity: 0.15;
        }

        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(40px, -30px) scale(1.1);
            }
            66% {
                transform: translate(-20px, 40px) scale(0.9);
            }
            100% {
                transform: translate(30px, 20px) scale(1.05);
            }
        }

        /* ─── Main Card ─── */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(24px) saturate(1.2);
            -webkit-backdrop-filter: blur(24px) saturate(1.2);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .card.hidden {
            display: none;
        }

        /* ─── STUDENT VIEW · FULLSCREEN MOBILE ─── */
        #studentView.card {
            max-width: 580px;
            padding: 32px 28px 40px;
        }

        #studentView h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--white) 30%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #studentView .sub {
            font-size: 1.05rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.65);
            margin-bottom: 24px;
            letter-spacing: 0.01em;
        }

        .answer-input {
            width: 100%;
            padding: 20px 24px;
            margin: 8px 0 18px;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.12);
            background: rgba(10, 22, 40, 0.70);
            color: var(--white);
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            backdrop-filter: blur(4px);
            -webkit-appearance: none;
            appearance: none;
        }

        .answer-input::placeholder {
            color: rgba(255, 255, 255, 0.30);
            font-weight: 400;
            font-size: 1.2rem;
        }

        .answer-input:focus {
            border-color: var(--orange);
            box-shadow: 0 0 0 4px var(--orange-glow);
        }

        .btn {
            width: 100%;
            padding: 20px 24px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, var(--orange), #e0652e);
            color: #fff;
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.25s;
            box-shadow: 0 8px 28px rgba(244, 121, 62, 0.30);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 14px 40px rgba(244, 121, 62, 0.45);
        }
        .btn:active {
            transform: scale(0.97);
        }

        .btn .icon {
            font-size: 1.5rem;
            line-height: 1;
        }

        /* ─── INSTRUCTOR VIEW · WIDE & PROJECTOR-READY ─── */
        #resultsView.card {
            max-width: 1600px;
            width: 96vw;
            padding: 28px 32px 36px;
        }

        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }

        .results-header h2 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--white), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .results-header .stats {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .results-header .badge {
            background: rgba(244, 121, 62, 0.20);
            border: 1px solid rgba(244, 121, 62, 0.25);
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 1rem;
            color: var(--gold);
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: scale(1.02);
        }

        /* ─── QR SECTION ─── */
        .qr-section {
            display: flex;
            align-items: center;
            gap: 28px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 16px 28px 16px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            flex-wrap: wrap;
            position: relative;
        }

        .qr-toggle {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.2s;
            position: absolute;
            top: 12px;
            right: 16px;
        }
        .qr-toggle:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        #qrCode {
            background: #fff;
            padding: 8px;
            border-radius: 16px;
            flex-shrink: 0;
            width: 220px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        #qrCode img,
        #qrCode canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        .qr-label {
            font-size: 1.3rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
        }
        .qr-label small {
            display: block;
            font-weight: 400;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.45);
            margin-top: 2px;
        }

        /* ─── WORD CLOUD ─── */
        .cloud-wrapper {
            position: relative;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            background: rgba(10, 22, 40, 0.50);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.30);
            aspect-ratio: 16 / 9;
            min-height: 520px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cloud-wrapper canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
        }

        .empty-message {
            font-size: 1.6rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.25);
            text-align: center;
            padding: 40px 20px;
            letter-spacing: 0.02em;
        }

        .live-label {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            font-size: 0.8rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-top: 10px;
            gap: 12px;
        }

        .live-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulseDot 1.8s ease-in-out infinite;
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.40);
        }

        @keyframes pulseDot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(0.85);
            }
        }

        /* ─── TOAST ─── */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(10, 22, 40, 0.92);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.10);
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--white);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.60);
            opacity: 0;
            transition: opacity 0.4s, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 999;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast .emoji {
            margin-right: 12px;
        }

        /* ─── RESPONSIVE: MOBILE (STUDENT FULLSCREEN) ─── */
        @media (max-width: 768px) {
            body {
                padding: 0;
                background: var(--navy);
            }

            #studentView.card {
                width: 100vw;
                max-width: 100%;
                height: 100dvh;
                border-radius: 0;
                padding: 2rem 1.5rem;
                justify-content: center;
                background: var(--navy);
                backdrop-filter: none;
                border: none;
                box-shadow: none;
                display: flex;
                flex-direction: column;
            }

            #studentView h1 {
                font-size: 2.8rem !important;
                margin-bottom: 4px;
            }
            #studentView .sub {
                font-size: 1.4rem !important;
                margin-bottom: 32px;
            }

            .answer-input {
                font-size: 2.2rem !important;
                padding: 1.8rem 1.5rem !important;
                border-radius: 20px;
                margin: 10px 0 24px;
            }
            .answer-input::placeholder {
                font-size: 1.8rem;
            }

            .btn {
                font-size: 2.2rem !important;
                padding: 1.8rem 1.5rem !important;
                border-radius: 60px;
            }
            .btn .icon {
                font-size: 2.2rem;
            }

            /* instructor view adjustments */
            #resultsView.card {
                width: 100vw;
                padding: 16px;
                border-radius: 0;
                background: var(--navy);
                backdrop-filter: none;
                border: none;
                box-shadow: none;
            }
            .results-header h2 {
                font-size: 1.6rem;
            }
            .cloud-wrapper {
                min-height: 40vh;
                aspect-ratio: 4 / 3;
            }
            #qrCode {
                width: 140px;
                height: 140px;
            }
            .qr-label {
                font-size: 1rem;
            }
            .qr-section {
                padding: 12px 16px;
                gap: 16px;
            }
            .qr-toggle {
                font-size: 0.6rem;
                top: 6px;
                right: 8px;
            }
        }

        @media (max-width: 480px) {
            #studentView h1 {
                font-size: 2.2rem !important;
            }
            .answer-input {
                font-size: 1.8rem !important;
                padding: 1.4rem 1.2rem !important;
            }
            .answer-input::placeholder {
                font-size: 1.4rem;
            }
            .btn {
                font-size: 1.8rem !important;
                padding: 1.4rem 1.2rem !important;
            }
            .cloud-wrapper {
                min-height: 30vh;
            }
            #qrCode {
                width: 100px;
                height: 100px;
            }
        }

        /* ─── UTILITIES ─── */
        .hidden {
            display: none !important;
        }
        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gap-8 {
            gap: 8px;
        }
        .mt-8 {
            margin-top: 8px;
        }
        .text-center {
            text-align: center;
        }
        .relative {
            position: relative;
        }
    </style>
</head>
<body>

    <!-- ─── Floating Orbs ─── -->
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>

    <!-- ─── Toast ─── -->
    <div id="toast" class="toast">
        <span class="emoji">✈️</span> <span id="toastMsg">Response submitted!</span>
    </div>

    <!-- ─── STUDENT INPUT VIEW (fullscreen mobile) ─── -->
    <div id="studentView" class="card">
        <h1>What makes you trust<br />an aviation leader?</h1>
        <p class="sub">One word. One insight. ✦</p>

        <form id="pollForm"
        action="https://docs.google.com/forms/d/e/1FAIpQLSf1TqzrUIvGkqz4ektOj4sRyLRaUrNli4bb6LJz4fT-1Ll9zw/formResponse"
        method="POST"
        target="hidden_iframe">

        <input
        type="text"
        name="entry.192253551"
        class="answer-input"
        placeholder="e.g. Integrity, Vision, Empathy…"
        required
        autocomplete="off"
        />

        <button type="submit" class="btn">
            <span class="icon">✈️</span> Submit
        </button>
    </form>
</div>

<!-- ─── INSTRUCTOR RESULTS VIEW (wide, projector-ready) ─── -->
<div id="resultsView" class="card hidden">

    <div class="results-header">
        <h2>✦ Insight Cloud</h2>
        <div class="stats">
            <span class="badge" id="responseCount">0 responses</span>
            <button class="refresh-btn" id="manualRefresh" title="Refresh now">
                <span>⟳</span> Refresh
            </button>
        </div>
    </div>

    <!-- QR Section with Toggle -->
    <div class="qr-section relative" id="qrSection">
        <button class="qr-toggle" id="qrToggle">Hide QR</button>
        <div id="qrCode"></div>
        <div class="qr-label">
            Scan to participate
            <small>Share with your team</small>
        </div>
    </div>

    <!-- Word Cloud -->
    <div class="cloud-wrapper" id="cloudWrapper">
        <canvas id="wordCloudCanvas"></canvas>
        <div id="emptyState" class="empty-message" style="display:none; position:absolute; inset:0; align-items:center; justify-content:center; pointer-events:none; flex-direction:column;">
            <div>✨ No responses yet</div>
            <div style="font-size:1rem; margin-top:8px; opacity:0.6;">Share the QR code to start collecting</div>
        </div>
    </div>

    <div class="live-label">
        <span class="live-dot"></span> live · updates every 4s
    </div>
</div>

<!-- ─── Hidden iframe ─── -->
<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

<script>
    (function() {
        'use strict';

        // ─── Config ───
        const PUBLISHED_CSV_URL =
            'https://docs.google.com/spreadsheets/d/e/2PACX-1vTZu3WENFFKzTpkrrgEZrB9KtvJk0RTUJsyhGr0Wys3quuN4RvE5lp4QQnNKR19LRvnHoNySwLGqfx8/pub?gid=370434378&single=true&output=csv';

        const WORD_COLORS = [
            '#f4793e', '#f58b54', '#f69d6a', '#f7af80', '#f8c196',
            '#fbbf6e', '#fccb84', '#fdd79a', '#fee3b0', '#ffefc6',
            '#ff8a5c', '#ff7a4a', '#ff6a38', '#ff5a26', '#ff4a14',
            '#4a9eff', '#6aafff', '#8abfff', '#aacfff', '#cadfff',
            '#ff6b6b', '#ff8e8e', '#ffb0b0', '#ffd2d2', '#fff0f0',
        ];

        // ─── DOM refs ───
        const studentView = document.getElementById('studentView');
        const resultsView = document.getElementById('resultsView');
        const canvas = document.getElementById('wordCloudCanvas');
        const cloudWrapper = document.getElementById('cloudWrapper');
        const emptyState = document.getElementById('emptyState');
        const qrContainer = document.getElementById('qrCode');
        const qrSection = document.getElementById('qrSection');
        const qrToggle = document.getElementById('qrToggle');
        const responseCount = document.getElementById('responseCount');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');
        const form = document.getElementById('pollForm');
        const iframe = document.getElementById('hidden_iframe');
        const manualRefreshBtn = document.getElementById('manualRefresh');

        let cloudInitialized = false;
        let toastTimer = null;
        let qrVisible = true;
        let updateInterval = null;

        // ─── Check mode ───
        const params = new URLSearchParams(window.location.search);
        const isResults = params.get('view') === 'results';

        if (isResults) {
            studentView.classList.add('hidden');
            resultsView.classList.remove('hidden');
            // Generate QR
            new QRCode(qrContainer, {
                text: window.location.origin + window.location.pathname,
                width: 220,
                height: 220,
                colorDark: '#0a1628',
                colorLight: '#ffffff',
            });
            // Start cloud updates
            fetchAndUpdate();
            updateInterval = setInterval(fetchAndUpdate, 4000);
        }

        // ─── CSV Parser (handles quoted fields) ───
        function parseCSVRow(row) {
            const matches = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            if (!matches) return [];
            return matches.map(m => m.replace(/^"|"$/g, ''));
        }

        // ─── Fetch & Update Cloud ───
        async function fetchAndUpdate() {
            try {
                const response = await fetch(PUBLISHED_CSV_URL, {
                    cache: 'no-store',
                    headers: { 'Cache-Control': 'no-cache' }
                });
                if (!response.ok) throw new Error('Network error');
                const csvText = await response.text();

                const lines = csvText.split('\n').filter(line => line.trim());
                if (lines.length < 2) {
                    showEmptyState(true);
                    responseCount.textContent = '0 responses';
                    return;
                }

                const dataRows = lines.slice(1);
                const wordMap = new Map();

                for (const row of dataRows) {
                    const cols = parseCSVRow(row);
                    // Usually Google Forms CSV: [timestamp, answer]
                    const word = (cols.length > 1) ? cols[1] : cols[0];
                    if (word && word.trim()) {
                        const clean = word.trim();
                        const lower = clean.toLowerCase();
                        if (wordMap.has(lower)) {
                            wordMap.get(lower).count += 1;
                        } else {
                            wordMap.set(lower, { display: clean, count: 1 });
                        }
                    }
                }

                const totalResponses = dataRows.length;
                responseCount.textContent = `${totalResponses} responses`;

                if (wordMap.size === 0) {
                    showEmptyState(true);
                    return;
                }

                showEmptyState(false);
                const wordList = Array.from(wordMap.values()).map(item => [item.display, item.count]);
                renderCloud(wordList);

            } catch (e) {
                console.warn('Cloud update failed:', e);
                showEmptyState(true);
            }
        }

        // ─── Show/hide empty state ───
        function showEmptyState(show) {
            if (emptyState) {
                emptyState.style.display = show ? 'flex' : 'none';
            }
            if (show) {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        // ─── Render Cloud ───
        function renderCloud(list) {
            if (!canvas || !cloudWrapper) return;

            const rect = cloudWrapper.getBoundingClientRect();
            const w = Math.max(rect.width || 600, 400);
            const h = Math.max(rect.height || 400, 300);
            const dpr = Math.min(window.devicePixelRatio || 1, 2);

            canvas.width = w * dpr;
            canvas.height = h * dpr;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);

            const sorted = [...list].sort((a, b) => b[1] - a[1]);
            if (sorted.length === 0) {
                showEmptyState(true);
                return;
            }

            const maxWeight = sorted[0]?.[1] || 40;
            const minWeight = sorted[sorted.length - 1]?.[1] || 10;
            const weightRange = Math.max(maxWeight - minWeight, 1);

            const weightFactor = function(w) {
                const normalized = (w - minWeight) / weightRange;
                const size = 18 + normalized * 58;
                return Math.min(Math.max(size, 16), 76);
            };

            const gridSize = Math.max(8, Math.min(20, Math.round(44 / Math.sqrt(sorted.length))));

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            try {
                WordCloud(canvas, {
                    list: sorted,
                    gridSize: gridSize,
                    weightFactor: weightFactor,
                    fontFamily: "'Inter', 'Segoe UI', system-ui, sans-serif",
                    fontWeight: '600',
                    color: function(word, weight) {
                        const hash = word.split('').reduce((acc, ch) => acc + ch.charCodeAt(0), 0);
                        const idx = (hash + weight) % WORD_COLORS.length;
                        return WORD_COLORS[idx];
                    },
                    rotate: function(word, weight) {
                        const hash = word.split('').reduce((acc, ch) => acc + ch.charCodeAt(0), 0);
                        const angle = (hash % 7) / 7;
                        if (angle < 0.25) return -Math.PI / 6;
                        if (angle < 0.50) return Math.PI / 6;
                        if (angle < 0.70) return -Math.PI / 4;
                        if (angle < 0.85) return Math.PI / 4;
                        return 0;
                    },
                    backgroundColor: 'transparent',
                    minSize: 14,
                    shrinkToFit: true,
                    clearCanvas: true,
                });
                cloudInitialized = true;
            } catch (e) {
                console.warn('WordCloud render error:', e);
                ctx.fillStyle = 'rgba(255,255,255,0.12)';
                ctx.font = '24px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('✦ rendering…', canvas.width / 2, canvas.height / 2);
            }
        }

        // ─── Toast ───
        function showToast(message) {
            if (toastTimer) {
                clearTimeout(toastTimer);
                toast.classList.remove('show');
            }
            toastMsg.textContent = message;
            toast.classList.add('show');
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
                toastTimer = null;
            }, 3000);
        }

        // ─── Form submission ───
        iframe.onload = function() {
            showToast('Response submitted — thank you!');
            form.reset();
            setTimeout(fetchAndUpdate, 800);
        };

        // ─── QR Toggle ───
        qrToggle.addEventListener('click', function() {
            qrVisible = !qrVisible;
            const qrContent = qrSection.querySelector('#qrCode, .qr-label');
            // Hide the QR code div and label, keep the toggle button visible
            const qrDiv = document.getElementById('qrCode');
            const label = qrSection.querySelector('.qr-label');
            if (qrVisible) {
                qrDiv.style.display = 'flex';
                label.style.display = 'block';
                qrToggle.textContent = 'Hide QR';
            } else {
                qrDiv.style.display = 'none';
                label.style.display = 'none';
                qrToggle.textContent = 'Show QR';
            }
        });

        // ─── Manual Refresh ───
        manualRefreshBtn.addEventListener('click', function() {
            fetchAndUpdate();
            // Visual feedback
            const original = this.innerHTML;
            this.innerHTML = '⟳ Refreshing…';
            setTimeout(() => { this.innerHTML = original; }, 1000);
        });

        // ─── Resize handler ───
        let resizeTimer;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if (isResults && cloudInitialized) {
                    fetchAndUpdate();
                }
            }, 500);
        });

        // ─── Expose for debugging ───
        window.__fetchCloud = fetchAndUpdate;

        // ─── Initial render if results ───
        if (isResults) {
            setTimeout(fetchAndUpdate, 400);
        }

    })();
</script>

</body>
</html>
