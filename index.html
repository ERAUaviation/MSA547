<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MSA 547 - Trust in Aviation Leadership</title>
    <style>
        :root {
            --navy: #0a1628;
            --panel-bg: #111d33;
            --sky-blue: #4a90d9;
            --pale-blue: #b8d4f0;
            --pure-white: #ffffff;
            --orange: #f4793e;
            --teal: #34b7a8;
            --red-accent: #e74c3c;
            --green-accent: #2ecc71;
            --glass-border: rgba(255, 255, 255, 0.10);
            --shadow-lg: 0 25px 60px rgba(0, 0, 0, 0.5);
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 12px;
            --transition: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --font-display: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
            --font-body: 'Segoe UI', 'Inter', 'Helvetica Neue', system-ui, -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
        body {
            font-family: var(--font-body);
            background: var(--navy);
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(74, 144, 217, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(244, 121, 62, 0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 80%, rgba(52, 183, 168, 0.06) 0%, transparent 50%);
            min-height: 100vh;
            color: var(--pure-white);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            overflow-x: hidden;
        }
        .app-container { position: relative; z-index: 1; width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 20px; }
        .card {
            background: var(--panel-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 28px 24px;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: relative;
        }
        .accent-line { width: 60px; height: 3px; border-radius: 3px; background: var(--orange); margin: 6px 0 14px; }
        .question-text { font-family: var(--font-display); font-size: 1.45rem; font-weight: 400; line-height: 1.35; color: var(--pure-white); }
        .subtitle { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--sky-blue); font-weight: 600; margin-bottom: 2px; }
        .label-text { font-size: 0.85rem; color: var(--pale-blue); letter-spacing: 0.03em; font-weight: 500; }
        .answer-input {
            width: 100%; padding: 16px 18px; font-size: 1.1rem; font-family: var(--font-body);
            background: rgba(255, 255, 255, 0.04); border: 2px solid var(--glass-border);
            border-radius: var(--radius-md); color: var(--pure-white); outline: none; transition: var(--transition);
        }
        .answer-input:focus { border-color: var(--sky-blue); background: rgba(74, 144, 217, 0.08); box-shadow: 0 0 0 8px rgba(74, 144, 217, 0.06); }
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 14px 28px; font-size: 1rem; font-weight: 600; border-radius: 50px;
            cursor: pointer; border: none; transition: var(--transition); width: 100%;
        }
        .btn-primary { background: var(--orange); color: #fff; box-shadow: 0 8px 24px rgba(244, 121, 62, 0.35); padding: 16px 36px; }
        .btn-primary:hover { background: #ff8c55; transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .toast {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-120px);
            background: #1a3d2e; border: 1px solid var(--green-accent); color: #d4f7f0;
            padding: 14px 24px; border-radius: 50px; font-weight: 600; font-size: 0.9rem;
            z-index: 100; box-shadow: 0 12px 36px rgba(0, 0, 0, 0.5); transition: transform 0.4s;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="toast" id="toast">✅ Answer submitted successfully!</div>

    <div class="app-container">
        <div class="card">
            <span class="subtitle">MSA 547 · Leadership & Critical Decision-Making</span>
            <div class="accent-line"></div>
            <h1 class="question-text">In one or two words,<br>what makes you trust an aviation leader?</h1>
        </div>

        <div class="card">
            <form id="pollForm" action="https://docs.google.com/forms/d/e/1FAIpQLSf1TqzrUIvGkqz4ektOj4sRyLRaUrNli4bb6LJz4fT-1Ll9zw/formResponse" method="POST" target="hidden_iframe">
                
                <div style="display:flex;flex-direction:column;gap:8px;">
                    <label class="label-text" for="answerInput">Your answer (1–2 words):</label>
                    
                    <input type="text" name="entry.192253551" id="answerInput" class="answer-input" placeholder="Enter answer..." required>
                </div>
                
                <div style="height:20px;"></div>
                <button type="submit" class="btn btn-primary" id="submitBtn">✈️ Submit Answer</button>
            </form>
        </div>
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <script>
        const form = document.getElementById('pollForm');
        const submitBtn = document.getElementById('submitBtn');
        const toast = document.getElementById('toast');
        const iframe = document.getElementById('hidden_iframe');

        // When user clicks submit, change button text
        form.addEventListener('submit', function() {
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Submitting...';
        });

        // When the invisible iframe loads, the submission is complete
        iframe.onload = function() {
            if(submitBtn.disabled) { // Checks if we just submitted
                // Show success message
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3500);
                
                // Reset form
                form.reset();
                submitBtn.disabled = false;
                submitBtn.textContent = '✈️ Submit Answer';
                document.getElementById('answerInput').focus();
            }
        }
    </script>
</body>
</html>
