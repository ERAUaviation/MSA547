<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>MSA 547 · Live Feedback Cloud</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.1.0/wordcloud2.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js">
    </script>
    <style>
        /* ─── Reset & Base ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #0b1a2e;
            --royal-blue: #1a2a4a;
            --gold: #d4af37;
            --gold-light: #f0d080;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --white: #f0f4ff;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            --radius: 24px;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--navy);
            color: var(--white);
            overflow-x: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        /* ─── Animated Background ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(212, 175, 55, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(26, 42, 74, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(10, 22, 40, 0.80) 0%, var(--navy) 100%);
            animation: bgPulse 12s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% {
                opacity: 0.7;
                transform: scale(1);
            }
            100% {
                opacity: 1;
                transform: scale(1.03);
            }
        }

        /* ─── Floating Orbs ─── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.2;
            animation: orbFloat 18s ease-in-out infinite alternate;
        }
        .orb--1 {
            width: 350px;
            height: 350px;
            background: var(--gold);
            top: -10%;
            left: -10%;
            animation-duration: 22s;
        }
        .orb--2 {
            width: 250px;
            height: 250px;
            background: #2a4a7a;
            bottom: -10%;
            right: -10%;
            animation-duration: 26s;
            animation-delay: -6s;
        }

        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -20px) scale(1.1);
            }
            66% {
                transform: translate(-15px, 30px) scale(0.9);
            }
            100% {
                transform: translate(20px, 15px) scale(1.05);
            }
        }

        /* ─── Main Card ─── */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(1.2);
            -webkit-backdrop-filter: blur(20px) saturate(1.2);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .card.hidden {
            display: none;
        }

        /* ─── STUDENT VIEW · FULLSCREEN MOBILE · LUXURY THEME ─── */
        #studentView.card {
            max-width: 580px;
            padding: 32px 28px 40px;
            background: linear-gradient(145deg, rgba(26, 42, 74, 0.7), rgba(10, 22, 40, 0.9));
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        #studentView h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 6px;
            background: linear-gradient(135deg, var(--gold-light) 20%, var(--gold) 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #studentView .sub {
            font-size: 1rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 22px;
            letter-spacing: 0.02em;
        }

        .answer-input {
            width: 100%;
            padding: 18px 22px;
            margin: 6px 0 16px;
            border-radius: 16px;
            border: 2px solid rgba(212, 175, 55, 0.25);
            background: rgba(10, 22, 40, 0.7);
            color: var(--white);
            font-size: 1.3rem;
            font-weight: 500;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            backdrop-filter: blur(4px);
        }

        .answer-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-weight: 400;
            font-size: 1.1rem;
        }

        .answer-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px var(--gold-glow);
        }

        .btn {
            width: 100%;
            padding: 18px 22px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, var(--gold), #b8962f);
            color: #0b1a2e;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.25s;
            box-shadow: 0 8px 28px rgba(212, 175, 55, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 14px 40px rgba(212, 175, 55, 0.5);
        }
        .btn:active {
            transform: scale(0.97);
        }

        .btn .icon {
            font-size: 1.4rem;
            line-height: 1;
        }

        /* ─── INSTRUCTOR VIEW ─── */
        #resultsView.card {
            max-width: 1500px;
            width: 96%;
            padding: 18px 22px 22px;
        }

        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .results-header h2 {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .results-header .stats {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .results-header .badge {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 3px 14px;
            border-radius: 40px;
            font-size: 0.9rem;
            color: var(--gold-light);
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            padding: 3px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.14);
        }

        /* ─── CONTENT ROW ─── */
        .content-row {
            display: flex;
            gap: 18px;
            align-items: stretch;
        }

        /* ─── QR SECTION ─── */
        .qr-section {
            flex: 0 0 160px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 12px 12px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 160px;
        }

        .qr-toggle {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: 0.2s;
            position: absolute;
            top: 6px;
            right: 8px;
        }
        .qr-toggle:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        #qrCode {
            background: #fff;
            padding: 6px;
            border-radius: 12px;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            flex-shrink: 0;
        }
        #qrCode img,
        #qrCode canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        .qr-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            margin-top: 6px;
            line-height: 1.3;
        }
        .qr-label small {
            display: block;
            font-weight: 400;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.35);
        }

        /* ─── CLOUD WRAPPER ─── */
        .cloud-wrapper {
            flex: 1;
            position: relative;
            border-radius: 18px;
            overflow: hidden;
            background: rgba(10, 22, 40, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.2);
            aspect-ratio: 16 / 9;
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cloud-wrapper canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
        }

        .empty-message {
            font-size: 1.2rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.2);
            text-align: center;
            padding: 20px;
            letter-spacing: 0.02em;
        }

        .live-label {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            font-size: 0.6rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-top: 6px;
            gap: 8px;
        }

        .live-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulseDot 1.8s ease-in-out infinite;
            box-shadow: 0 0 8px rgba(74, 222, 128, 0.35);
        }

        @keyframes pulseDot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(0.8);
            }
        }

        /* ─── TOAST (top) ─── */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: rgba(10, 22, 40, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            color: var(--white);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
            opacity: 0;
            transition: opacity 0.4s, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 999;
            pointer-events: none;
            white-space: nowrap;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast .emoji {
            margin-right: 8px;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 820px) {
            .content-row {
                flex-direction: column;
                gap: 14px;
            }
            .qr-section {
                flex: none;
                flex-direction: row;
                padding: 12px 18px;
                gap: 18px;
                min-height: auto;
                justify-content: flex-start;
            }
            #qrCode {
                width: 100px;
                height: 100px;
            }
            .qr-label {
                margin-top: 0;
                text-align: left;
            }
            .qr-toggle {
                top: 4px;
                right: 8px;
            }
            .cloud-wrapper {
                min-height: 200px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 0;
                background: var(--navy);
            }

            #studentView.card {
                width: 100vw;
                max-width: 100%;
                height: 100dvh;
                border-radius: 0;
                padding: 2rem 1.5rem;
                justify-content: center;
                background: linear-gradient(145deg, rgba(26, 42, 74, 0.9), rgba(10, 22, 40, 0.95));
                border: none;
                box-shadow: none;
                display: flex;
                flex-direction: column;
            }

            #studentView h1 {
                font-size: 2.8rem !important;
                margin-bottom: 4px;
            }
            #studentView .sub {
                font-size: 1.4rem !important;
                margin-bottom: 30px;
            }

            .answer-input {
                font-size: 2.2rem !important;
                padding: 1.8rem 1.5rem !important;
                border-radius: 20px;
                margin: 10px 0 22px;
            }
            .answer-input::placeholder {
                font-size: 1.8rem;
            }

            .btn {
                font-size: 2.2rem !important;
                padding: 1.8rem 1.5rem !important;
                border-radius: 60px;
            }
            .btn .icon {
                font-size: 2.2rem;
            }

            #resultsView.card {
                width: 100vw;
                padding: 12px 14px 16px;
                border-radius: 0;
                background: var(--navy);
                backdrop-filter: none;
                border: none;
                box-shadow: none;
            }
            .results-header h2 {
                font-size: 1.4rem;
            }
            .cloud-wrapper {
                min-height: 30vh;
                aspect-ratio: 4 / 3;
            }
            .qr-section {
                padding: 10px 14px;
                gap: 14px;
            }
            #qrCode {
                width: 80px;
                height: 80px;
            }
            .qr-label {
                font-size: 0.75rem;
            }
            .qr-toggle {
                font-size: 0.55rem;
                top: 4px;
                right: 6px;
            }
            .live-label {
                font-size: 0.6rem;
            }
            .toast {
                font-size: 0.9rem;
                padding: 10px 20px;
                white-space: normal;
                max-width: 90%;
                top: 12px;
            }
        }

        @media (max-width: 480px) {
            #studentView h1 {
                font-size: 2.2rem !important;
            }
            .answer-input {
                font-size: 1.8rem !important;
                padding: 1.4rem 1.2rem !important;
            }
            .answer-input::placeholder {
                font-size: 1.4rem;
            }
            .btn {
                font-size: 1.8rem !important;
                padding: 1.4rem 1.2rem !important;
            }
            .cloud-wrapper {
                min-height: 25vh;
            }
            #qrCode {
                width: 64px;
                height: 64px;
            }
        }

        .hidden {
            display: none !important;
        }
        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .relative {
            position: relative;
        }
    </style>
</head>
<body>

    <!-- ─── Floating Orbs ─── -->
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>

    <!-- ─── Toast (top) ─── -->
    <div id="toast" class="toast">
        <span class="emoji">✈️</span> <span id="toastMsg">Response submitted!</span>
    </div>

    <!-- ─── STUDENT INPUT VIEW ─── -->
    <div id="studentView" class="card">
        <h1>What makes a great leader?</h1>
        <p class="sub">Share your insight in one word ✦</p>

        <form id="pollForm"
        action="https://docs.google.com/forms/d/e/1FAIpQLSf1TqzrUIvGkqz4ektOj4sRyLRaUrNli4bb6LJz4fT-1Ll9zw/formResponse"
        method="POST"
        target="hidden_iframe">

        <input
        type="text"
        name="entry.192253551"
        class="answer-input"
        placeholder="Type your response…"
        required
        autocomplete="off"
        />

        <button type="submit" class="btn">
            <span class="icon">✦</span> Submit
        </button>
    </form>
</div>

<!-- ─── INSTRUCTOR RESULTS VIEW ─── -->
<div id="resultsView" class="card hidden">

    <div class="results-header">
        <h2>✦ Insight Cloud</h2>
        <div class="stats">
            <span class="badge" id="responseCount">0 responses</span>
            <button class="refresh-btn" id="manualRefresh" title="Refresh now">
                <span>⟳</span>
            </button>
        </div>
    </div>

    <div class="content-row">
        <!-- QR Section -->
        <div class="qr-section relative" id="qrSection">
            <button class="qr-toggle" id="qrToggle">Hide</button>
            <div id="qrCode"></div>
            <div class="qr-label">
                Scan to join
                <small>share with your group</small>
            </div>
        </div>

        <!-- Word Cloud -->
        <div class="cloud-wrapper" id="cloudWrapper">
            <canvas id="wordCloudCanvas"></canvas>
            <div id="emptyState" class="empty-message" style="display:none; position:absolute; inset:0; align-items:center; justify-content:center; pointer-events:none; flex-direction:column;">
                <div>✨ No responses yet</div>
                <div style="font-size:0.9rem; margin-top:6px; opacity:0.5;">Share the QR code to start</div>
            </div>
        </div>
    </div>

    <div class="live-label">
        <span class="live-dot"></span> live
    </div>
</div>

<!-- ─── Hidden iframe ─── -->
<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

<script>
    (function() {
        'use strict';

        // ─── Config ───
        const PUBLISHED_CSV_URL =
            'https://docs.google.com/spreadsheets/d/e/2PACX-1vTZu3WENFFKzTpkrrgEZrB9KtvJk0RTUJsyhGr0Wys3quuN4RvE5lp4QQnNKR19LRvnHoNySwLGqfx8/pub?gid=370434378&single=true&output=csv';

        const WORD_COLORS = [
            '#d4af37', '#e8c45a', '#f0d080', '#f8dc9e', '#ffe8bc',
            '#c9a030', '#b8962f', '#a8862a', '#987625', '#886620',
            '#4a7a9c', '#5a8aac', '#6a9abc', '#7aaacc', '#8abadd',
            '#ff6b6b', '#ff8e8e', '#ffb0b0', '#ffd2d2', '#fff0f0',
        ];

        // ─── DOM refs ───
        const studentView = document.getElementById('studentView');
        const resultsView = document.getElementById('resultsView');
        const canvas = document.getElementById('wordCloudCanvas');
        const cloudWrapper = document.getElementById('cloudWrapper');
        const emptyState = document.getElementById('emptyState');
        const qrContainer = document.getElementById('qrCode');
        const qrSection = document.getElementById('qrSection');
        const qrToggle = document.getElementById('qrToggle');
        const responseCount = document.getElementById('responseCount');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');
        const form = document.getElementById('pollForm');
        const iframe = document.getElementById('hidden_iframe');
        const manualRefreshBtn = document.getElementById('manualRefresh');

        let cloudInitialized = false;
        let toastTimer = null;
        let qrVisible = true;
        let updateInterval = null;
        let lastWordHash = '';
        let lastValidCount = 0;
        let lastValidData = null;

        // ─── Check mode ───
        const params = new URLSearchParams(window.location.search);
        const isResults = params.get('view') === 'results';

        if (isResults) {
            studentView.classList.add('hidden');
            resultsView.classList.remove('hidden');
            // Generate QR
            new QRCode(qrContainer, {
                text: window.location.origin + window.location.pathname,
                width: 120,
                height: 120,
                colorDark: '#0a1628',
                colorLight: '#ffffff',
            });
            // Start cloud updates every 200ms, but only re-render on change
            fetchAndUpdate();
            updateInterval = setInterval(fetchAndUpdate, 200);
        }

        // ─── CSV Parser ───
        function parseCSVRow(row) {
            const matches = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            if (!matches) return [];
            return matches.map(m => m.replace(/^"|"$/g, ''));
        }

        // ─── Fetch & Update (only if data changed) ───
        async function fetchAndUpdate() {
            try {
                const response = await fetch(PUBLISHED_CSV_URL, {
                    cache: 'no-store',
                    headers: { 'Cache-Control': 'no-cache' }
                });
                if (!response.ok) throw new Error('Network error');
                const csvText = await response.text();

                const lines = csvText.split('\n').filter(line => line.trim());
                if (lines.length < 2) {
                    // No data – keep previous state if any
                    if (lastValidData) {
                        // keep showing last data
                        return;
                    }
                    showEmptyState(true);
                    responseCount.textContent = '0 responses';
                    lastValidCount = 0;
                    return;
                }

                const dataRows = lines.slice(1);
                const wordMap = new Map();

                for (const row of dataRows) {
                    const cols = parseCSVRow(row);
                    const word = (cols.length > 1) ? cols[1] : cols[0];
                    if (word && word.trim()) {
                        const clean = word.trim();
                        const lower = clean.toLowerCase();
                        if (wordMap.has(lower)) {
                            wordMap.get(lower).count += 1;
                        } else {
                            wordMap.set(lower, { display: clean, count: 1 });
                        }
                    }
                }

                const totalResponses = dataRows.length;

                // Update count only if it's different and we have data
                if (totalResponses !== lastValidCount || totalResponses === 0) {
                    responseCount.textContent = `${totalResponses} responses`;
                    lastValidCount = totalResponses;
                }

                if (wordMap.size === 0) {
                    showEmptyState(true);
                    return;
                }

                // Build sorted list
                const wordList = Array.from(wordMap.values()).map(item => [item.display, item.count]);
                const sorted = [...wordList].sort((a, b) => b[1] - a[1]);

                // Check if data changed
                const currentHash = JSON.stringify(sorted);
                if (currentHash === lastWordHash) {
                    // No change – keep current cloud
                    return;
                }
                lastWordHash = currentHash;
                lastValidData = sorted;

                showEmptyState(false);
                renderCloud(sorted);

            } catch (e) {
                console.warn('Cloud update failed:', e);
                // On error, keep previous state; don't reset count
                if (!lastValidData) {
                    showEmptyState(true);
                    responseCount.textContent = '0 responses';
                }
            }
        }

        // ─── Show/hide empty state ───
        function showEmptyState(show) {
            if (emptyState) {
                emptyState.style.display = show ? 'flex' : 'none';
            }
            if (show) {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        // ─── Render Cloud ───
        function renderCloud(list) {
            if (!canvas || !cloudWrapper) return;

            const rect = cloudWrapper.getBoundingClientRect();
            const w = Math.max(rect.width || 600, 300);
            const h = Math.max(rect.height || 400, 200);
            const dpr = Math.min(window.devicePixelRatio || 1, 2);

            canvas.width = w * dpr;
            canvas.height = h * dpr;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);

            const sorted = list;
            if (sorted.length === 0) {
                showEmptyState(true);
                return;
            }

            const maxWeight = sorted[0]?.[1] || 40;
            const minWeight = sorted[sorted.length - 1]?.[1] || 10;
            const weightRange = Math.max(maxWeight - minWeight, 1);

            const weightFactor = function(w) {
                const normalized = (w - minWeight) / weightRange;
                const size = 16 + normalized * 54;
                return Math.min(Math.max(size, 14), 72);
            };

            const gridSize = Math.max(8, Math.min(20, Math.round(44 / Math.sqrt(sorted.length))));

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            try {
                WordCloud(canvas, {
                    list: sorted,
                    gridSize: gridSize,
                    weightFactor: weightFactor,
                    fontFamily: "'Inter', 'Segoe UI', system-ui, sans-serif",
                    fontWeight: '600',
                    color: function(word, weight) {
                        const hash = word.split('').reduce((acc, ch) => acc + ch.charCodeAt(0), 0);
                        const idx = (hash + weight) % WORD_COLORS.length;
                        return WORD_COLORS[idx];
                    },
                    rotate: function(word, weight) {
                        const hash = word.split('').reduce((acc, ch) => acc + ch.charCodeAt(0), 0);
                        const angle = (hash % 7) / 7;
                        if (angle < 0.25) return -Math.PI / 6;
                        if (angle < 0.50) return Math.PI / 6;
                        if (angle < 0.70) return -Math.PI / 4;
                        if (angle < 0.85) return Math.PI / 4;
                        return 0;
                    },
                    backgroundColor: 'transparent',
                    minSize: 12,
                    shrinkToFit: true,
                    clearCanvas: true,
                });
                cloudInitialized = true;
            } catch (e) {
                console.warn('WordCloud render error:', e);
                ctx.fillStyle = 'rgba(255,255,255,0.10)';
                ctx.font = '20px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('✦ rendering…', canvas.width / 2, canvas.height / 2);
            }
        }

        // ─── Toast (top) ───
        function showToast(message) {
            if (toastTimer) {
                clearTimeout(toastTimer);
                toast.classList.remove('show');
            }
            toastMsg.textContent = message;
            toast.classList.add('show');
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
                toastTimer = null;
            }, 2800);
        }

        // ─── Form submission ───
        iframe.onload = function() {
            showToast('Response submitted — thank you!');
            form.reset();
            // Force refresh
            lastWordHash = '';
            setTimeout(fetchAndUpdate, 200);
        };

        // ─── QR Toggle ───
        qrToggle.addEventListener('click', function() {
            qrVisible = !qrVisible;
            const qrDiv = document.getElementById('qrCode');
            const label = qrSection.querySelector('.qr-label');
            if (qrVisible) {
                qrDiv.style.display = 'flex';
                label.style.display = 'block';
                qrToggle.textContent = 'Hide';
            } else {
                qrDiv.style.display = 'none';
                label.style.display = 'none';
                qrToggle.textContent = 'Show';
            }
        });

        // ─── Manual Refresh ───
        manualRefreshBtn.addEventListener('click', function() {
            lastWordHash = '';
            fetchAndUpdate();
            const original = this.innerHTML;
            this.innerHTML = '⟳ …';
            setTimeout(() => { this.innerHTML = original; }, 600);
        });

        // ─── Resize handler ───
        let resizeTimer;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if (isResults && cloudInitialized && lastValidData) {
                    renderCloud(lastValidData);
                }
            }, 300);
        });

        // ─── Expose for debugging ───
        window.__fetchCloud = fetchAndUpdate;

        // ─── Initial render ───
        if (isResults) {
            setTimeout(fetchAndUpdate, 300);
        }

    })();
</script>

</body>
</html>
